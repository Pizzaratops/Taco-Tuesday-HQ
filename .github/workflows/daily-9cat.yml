name: Daily 9cat Live Scores

on:
  schedule:
    # 08:00 & 20:00 Europe/Berlin, während Sommerzeit (CEST = UTC+2) -> 06:00 & 18:00 UTC.
    # ACHTUNG: Nach dem Ende der Sommerzeit (letzter Oktober-Sonntag) auf
    # '0 7 * * *' / '0 19 * * *' (CET = UTC+1) umstellen, sonst laufen die
    # Jobs im Winter eine Stunde später als 08/20 Uhr lokal. Cron kennt keine
    # Zeitzonen, GitHub Actions rechnet immer in UTC.
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Datum (YYYY-MM-DD), leer = heute'
        required: false
      league:
        description: 'ESPN League-Slug'
        required: false
        default: 'nba-summer-las-vegas'

permissions:
  contents: write

concurrency:
  group: daily-9cat
  cancel-in-progress: false

jobs:
  update-live-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tagesdaten von ESPN holen
        env:
          DATE_ARG: ${{ github.event.inputs.date }}
          LEAGUE_ARG: ${{ github.event.inputs.league || 'nba-summer-las-vegas' }}
        run: |
          node scripts/daily-9cat.js ${DATE_ARG} --league=${LEAGUE_ARG}

      - name: In livescores-daily.js konvertieren
        env:
          DATE_ARG: ${{ github.event.inputs.date }}
          LEAGUE_ARG: ${{ github.event.inputs.league || 'nba-summer-las-vegas' }}
        run: |
          if [ -n "$DATE_ARG" ]; then
            node scripts/convert-to-livescores.js --league="$LEAGUE_ARG" --date="$DATE_ARG" --keep-days=120
          else
            node scripts/convert-to-livescores.js --league="$LEAGUE_ARG" --keep-days=120
          fi

      - name: Weekly/Monthly aktualisieren (alle Standorte kombiniert)
        env:
          DATE_ARG: ${{ github.event.inputs.date }}
        run: |
          if [ -n "$DATE_ARG" ]; then
            node scripts/update-all-aggregates.js --end="$DATE_ARG" --keep=180
          else
            node scripts/update-all-aggregates.js --keep=180
          fi

      - name: Änderungen committen & pushen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/livescores-daily.js data/livescores-aggregate.js scripts/data/
          if git diff --cached --quiet; then
            echo "Keine Änderungen (vermutlich keine Spiele an diesem Tag)."
          else
            git commit -m "Live Scores: Daily-Update $(date -u +%Y-%m-%d)"
            git push
          fi
